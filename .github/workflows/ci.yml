name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Frontend Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@markra/desktop"
          - "@markra/web"
          - "@markra/ai"
          - "@markra/app"
          - "@markra/editor"
          - "@markra/markdown"
          - "@markra/providers"
          - "@markra/scripts"
          - "@markra/shared"
          - "@markra/ui"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm --filter "${{ matrix.package }}" test

  frontend-test-typecheck:
    name: Frontend Test Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck tests
        run: pnpm run typecheck:test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - frontend-tests
      - frontend-test-typecheck
      - frontend-build
    if: always()

    steps:
      - name: Check frontend jobs
        run: |
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "Frontend Tests result: ${{ needs.frontend-tests.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend-test-typecheck.result }}" != "success" ]; then
            echo "Frontend Test Typecheck result: ${{ needs.frontend-test-typecheck.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "Frontend Build result: ${{ needs.frontend-build.result }}"
            exit 1
          fi

  tauri-rust:
    name: Tauri Rust
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

      - name: Test
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked
